name: Run pre-commit hooks

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  success:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - name: Run
      run: |
        BUILDKIT_PROGRESS=plain docker compose up --quiet-pull -d localstack
