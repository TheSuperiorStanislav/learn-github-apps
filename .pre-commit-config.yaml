default_stages: [
  pre-commit,
  pre-push,
]
default_install_hook_types: [
  pre-commit,
  pre-push,
  post-checkout,
  post-merge,
  post-rewrite,
  commit-msg,
]
fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: check-xml
      - id: check-json
        exclude: ".*\\.vscode/"
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-aws-credentials
        args: [
          --allow-missing-credentials,
        ]
      - id: debug-statements
      - id: check-merge-conflict
        args: [
          --assume-in-merge,
        ]
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-added-large-files
        args: [
          --maxkb=1000,
        ]
      - id: file-contents-sorter
        files: "template/\\.vscode/(boilerplate-words|project-related-words)\\.txt"
        args: [
          --ignore-case,
        ]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [
          --fix,
        ]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v9.8.0
    hooks:
      - id: cspell

  - repo: https://github.com/rtts/djhtml
    rev: 3.0.11
    hooks:
      - id: djhtml
        args: [
          "--tabwidth=2",
        ]
      - id: djcss
        args: [
          "--tabwidth=2",
        ]
      - id: djjs
        args: [
          "--tabwidth=2",
        ]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        exclude: "template"
        args: [
          "--config=template/.markdownlint.yaml",
          "--fix",
        ]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
