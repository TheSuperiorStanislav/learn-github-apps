# ###########################################################################
# Localstack - solution for many aws services in one container
# Used for SQS
# Docs: https://docs.localstack.cloud/overview/
# ###########################################################################
localstack-base: &localstack-base
image: localstack/localstack:4.11
environment:
  # https://docs.localstack.cloud/references/configuration/
  - SERVICES=sqs,s3
  - DEBUG=1
  - DOCKER_HOST=unix:///var/run/docker.sock
  - AWS_ACCESS_KEY_ID=root
  - AWS_SECRET_ACCESS_KEY=rootroot
  - AWS_DEFAULT_REGION=us-west-1
  - AWS_ENDPOINT_URL=http://localhost.localstack.cloud:4566
volumes:
  - "${PWD}/.localstack_volume:/var/lib/localstack"
  - "/var/run/docker.sock:/var/run/docker.sock"

localstack:
<<: *localstack-base
hostname: localhost.localstack.cloud
ports:
  - "4566:4566"
